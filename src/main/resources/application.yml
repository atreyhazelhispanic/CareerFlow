spring:
  application:
    name: careerflow

  datasource:
    url: jdbc:postgresql://localhost:5432/careerflow
    username: careerflow_user
    password: careerflow_password

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration-minutes: 60

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.security: DEBUG