name: CareerFlow API CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: careerflow_test
          POSTGRES_USER: careerflow_user
          POSTGRES_PASSWORD: careerflow_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U careerflow_user -d careerflow_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/careerflow_test
      SPRING_DATASOURCE_USERNAME: careerflow_user
      SPRING_DATASOURCE_PASSWORD: careerflow_password
      JWT_SECRET: test-secret-test-secret-test-secret-test-secret

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run tests
        run: ./mvnw test

      - name: Build app
        run: ./mvnw package -DskipTests